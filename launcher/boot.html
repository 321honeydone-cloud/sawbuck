<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sawbuck AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
 html,body{margin:0;height:100%;}
 body{background:#0a0a0c;overflow:hidden;font-family:'DM Sans','Segoe UI',sans-serif;cursor:default;}
 .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0c;
   background-image:radial-gradient(110% 80% at 50% 44%,rgba(254,216,17,.06),transparent 58%),
     linear-gradient(rgba(254,216,17,.028) 1px,transparent 1px),
     linear-gradient(90deg,rgba(254,216,17,.028) 1px,transparent 1px);
   background-size:auto,52px 52px,52px 52px;}
 .lockup{display:flex;align-items:center;gap:28px;animation:rise 1.1s ease-out both;}
 .tile{width:104px;height:104px;border-radius:23px;background:#14181f;border:1px solid rgba(254,216,17,.16);
   display:flex;align-items:center;justify-content:center;animation:glow 2.6s ease-in-out infinite;}
 .divider{width:1px;height:78px;background:rgba(232,234,240,.14);}
 .word{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:900;font-size:62px;line-height:.9;
   letter-spacing:.01em;color:#e8eaf0;text-transform:uppercase;}
 .word .ai{color:#FED811;}
 .tag{font-weight:700;font-size:12px;letter-spacing:.24em;color:#8a95a8;margin-top:13px;text-transform:uppercase;}
 .bar{position:fixed;left:0;right:0;bottom:0;height:3px;background:rgba(254,216,17,.08);overflow:hidden;}
 .bar i{position:absolute;top:0;bottom:0;width:26%;
   background:linear-gradient(90deg,transparent,#FED811 35%,#fff0a0 50%,#FED811 65%,transparent);
   animation:sweep 1.5s ease-in-out infinite;}
 .foot{position:fixed;bottom:20px;font-size:11px;font-weight:500;letter-spacing:.18em;color:#4d5563;text-transform:uppercase;}
 .v{left:26px;} .l{right:26px;}
 #hint{position:fixed;bottom:54px;left:0;right:0;text-align:center;font-size:12px;color:#5a6270;opacity:0;transition:opacity .6s;}
 @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
 @keyframes glow{0%,100%{box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 rgba(254,216,17,0)}
   50%{box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 26px rgba(254,216,17,.22)}}
 @keyframes sweep{0%{transform:translateX(-110%)}100%{transform:translateX(420%)}}
 .logo{width:min(76vw,780px);height:auto;animation:rise 1.1s ease-out both;}
</style>
</head>
